# SEC-11 — ClamAV clamd sidecar for local / CI virus scanning.
# Included from the repo-root docker-compose.yml via Compose `include`.
#
# First boot downloads signature databases (freshclam); allow ~2–3 minutes
# before clamd accepts INSTREAM scans.

services:
  clamd:
    image: clamav/clamav:1.4
    ports:
      - "3310:3310"
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo PING | nc -w 3 127.0.0.1 3310 | grep -q PONG",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 180s

volumes:
  clamav_data:
