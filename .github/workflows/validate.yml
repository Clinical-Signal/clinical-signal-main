name: validate

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs on the same ref when a new push lands.
concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web (typecheck + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests (vitest)
        run: pnpm test

  engine:
    name: engine (python compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: services/analysis-engine/requirements.txt

      - name: Install engine dependencies (with test extras)
        run: pip install -r services/analysis-engine/requirements-dev.txt

      # Catches syntax errors and import-time failures fast — runs
      # before pytest so a broken module produces a clear compile
      # message instead of a confusing collection error.
      - name: Compile analysis-engine modules
        run: |
          python -m compileall -q services/analysis-engine/app
          python -m compileall -q services/analysis-engine/scripts

      # PR4 grep gate: refuse to ship if anything outside
      # services/analysis-engine/app/_core/db.py contains the literal
      # set_config('app.current_tenant_id', ...) string. Mirrors the
      # TS-side check at apps/web/scripts/check-system-access.mjs (PR3).
      - name: Tenant GUC discipline (no direct set_config outside _core)
        run: python services/analysis-engine/scripts/check_tenant_guc.py

      # PR5 grep gate: every engine HTTP route must be authenticated
      # (Depends(require_engine_jwt)) and no Pydantic request model
      # may expose tenant_id / practitioner_id. Together those rules
      # enforce that the engine's trust boundary is the JWT, not the
      # network.
      - name: Engine auth surface discipline
        run: python services/analysis-engine/scripts/check_engine_auth.py

      - name: Engine pytest suite
        run: python -m pytest services/analysis-engine/tests -q

  migrations:
    name: migrations (filename hygiene)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The migration runner refuses to start on duplicate version prefixes.
      # Checking here makes that failure visible at PR time instead of at
      # `docker compose up` / deploy time.
      - name: No duplicate migration version prefixes
        run: |
          dups=$(ls database/migrations/ | grep -E '^[0-9]{4}_' | cut -c1-4 | sort | uniq -d)
          if [ -n "$dups" ]; then
            echo "::error::Duplicate migration version prefixes found:"
            echo "$dups"
            exit 1
          fi

      - name: All migrations follow NNNN_name.sql pattern
        run: |
          bad=$(ls database/migrations/ | grep -v -E '^([0-9]{4}_[a-z0-9_]+\.sql|\.gitkeep)$' || true)
          if [ -n "$bad" ]; then
            echo "::error::Non-conforming migration filenames:"
            echo "$bad"
            exit 1
          fi
