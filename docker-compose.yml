services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clinical_signal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_dev_only}
      POSTGRES_DB: ${POSTGRES_DB:-clinical_signal}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
      - ./database/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clinical_signal} -d ${POSTGRES_DB:-clinical_signal}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot migration runner. Runs after Postgres is healthy, applies any
  # unapplied SQL migrations, then exits. Web and analysis-engine block on
  # service_completed_successfully so they only start against a fully-
  # migrated schema. See apps/web/scripts/migrate.mjs for the algorithm
  # (including baseline mode for adopting an existing schema).
  migrate:
    build:
      # Same build context as `web` (repo root) so the migrate one-shot
      # uses the same image layer cache as the web service.
      context: .
      dockerfile: ./infrastructure/docker/Dockerfile.web
    environment:
      # Migrate connects as the database superuser (POSTGRES_USER) because
      # migration 0002 needs CREATEROLE to provision `app_user`. The
      # runtime services (web, analysis-engine) connect as `app_user`
      # below so RLS applies to their queries.
      DATABASE_URL: postgresql://${POSTGRES_USER:-clinical_signal}:${POSTGRES_PASSWORD:-change_me_dev_only}@postgres:5432/${POSTGRES_DB:-clinical_signal}
      MIGRATIONS_DIR: /app/database-migrations
    command: ["node", "/app/scripts/migrate.mjs"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/web/scripts:/app/scripts:ro
      - ./database/migrations:/app/database-migrations:ro
    restart: "no"

  analysis-engine:
    build:
      context: ./services/analysis-engine
      dockerfile: ../../infrastructure/docker/Dockerfile.engine
    environment:
      # Engine connects as app_user so RLS applies on its writes.
      DATABASE_URL: postgresql://app_user:app_user_dev_password@postgres:5432/${POSTGRES_DB:-clinical_signal}
      PHI_ENCRYPTION_KEY: ${PHI_ENCRYPTION_KEY:-dev_only_change_me_phi_crypt_key}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-5}
      USE_KNOWLEDGE_BASE: ${USE_KNOWLEDGE_BASE:-1}
      # PR5 — engine JWT auth. Web signs HS256 JWTs with this secret;
      # the engine verifies them in require_engine_jwt. Web and engine
      # MUST share the exact same value. Rotate by deploying a new
      # secret to both services within a 5-minute window (the JWT TTL),
      # or stage a brief overlap by adding a list-of-secrets verifier.
      ENGINE_JWT_SECRET: ${ENGINE_JWT_SECRET:-dev_only_change_me_engine_jwt_secret_min_32}
      # Cache the sentence-transformers model across container rebuilds.
      SENTENCE_TRANSFORMERS_HOME: /models
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./services/analysis-engine/app:/app/app:ro
      - ./services/analysis-engine/prompts:/app/prompts:ro
      - ./services/analysis-engine/scripts:/app/scripts:ro
      - ./database/seed/knowledge:/knowledge_out
      # Source corpus for knowledge ingestion. Point LAURA_CHANNELS_DIR at the
      # directory of .txt channel exports to enable ingestion; defaults to the
      # in-repo seed placeholder when unset.
      - ${LAURA_CHANNELS_DIR:-./database/seed/knowledge}:/laura_channels:ro
      - models_cache:/models
      - uploads:/uploads

  web:
    build:
      # Build context is the repo root so the dev image can include
      # `packages/` alongside `apps/web/`. Internal TS packages (@cs/core,
      # @cs/db) are resolved by apps/web/tsconfig.json paths pointing at
      # ../../packages/{core,db}/src — those paths must exist at build
      # AND run time.
      context: .
      dockerfile: ./infrastructure/docker/Dockerfile.web
    environment:
      NODE_ENV: development
      # Web connects as app_user (NOSUPERUSER) so RLS policies actually apply.
      DATABASE_URL: postgresql://app_user:app_user_dev_password@postgres:5432/${POSTGRES_DB:-clinical_signal}
      ANALYSIS_ENGINE_URL: http://analysis-engine:8000
      # Web layer calls Claude directly for prep brief, clinical analysis,
      # protocol generation, and the derivative outputs. Forwarded from the
      # host .env so both web and analysis-engine share the same key.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AUTH_SECRET: ${AUTH_SECRET:-dev_only_change_me_minimum_32_chars_long}
      SESSION_IDLE_MINUTES: ${SESSION_IDLE_MINUTES:-15}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-00000000-0000-0000-0000-000000000001}
      # Dev-only key for pgcrypto-based column encryption (name/DOB). Rotate
      # via a KMS-backed key in production — the key never leaves secret
      # storage there and is loaded per-request into session config.
      PHI_ENCRYPTION_KEY: ${PHI_ENCRYPTION_KEY:-dev_only_change_me_phi_crypt_key}
      UPLOADS_DIR: /uploads
      # Path the engine sees for the same uploads volume. Lets the web service
      # hand the engine an absolute path it can open without re-uploading.
      ENGINE_UPLOADS_DIR: /uploads
      # PR5 — engine JWT auth. MUST match the value the analysis-engine
      # service sees. Web signs; engine verifies. See the analysis-engine
      # block above for rotation guidance.
      ENGINE_JWT_SECRET: ${ENGINE_JWT_SECRET:-dev_only_change_me_engine_jwt_secret_min_32}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      analysis-engine:
        condition: service_started
    volumes:
      - ./apps/web/app:/app/app:ro
      - ./apps/web/components:/app/components:ro
      - ./apps/web/lib:/app/lib:ro
      # Live-reload mount so edits in packages/{core,db}/src/ flow into
      # the running web container without a rebuild. Path matches the
      # tsconfig alias resolution (../../packages from /app).
      - ./packages:/packages:ro
      - uploads:/uploads

volumes:
  postgres_data:
  uploads:
  models_cache:
