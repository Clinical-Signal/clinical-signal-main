# Aptible deployment configuration
# The Dockerfile at the repo root builds the Next.js standalone app and
# also includes the migration runner script + database/migrations/ for
# the before_release step below.

before_release:
  # Apply any unapplied database migrations before traffic is routed to
  # the new container. Idempotent — already-applied migrations are
  # skipped via the schema_migrations table tracked by the runner.
  # On first run against an existing schema, the runner detects existing
  # tables and baselines historical migrations as already-applied. See
  # apps/web/scripts/migrate.mjs for the full algorithm.
  - node /app/scripts/migrate.mjs
